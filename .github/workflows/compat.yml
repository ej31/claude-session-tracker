name: Install E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node test/compat.mjs

      - name: Run CLI tests
        if: runner.os != 'Windows'
        run: node test/cli.mjs

      - name: Pack and install globally
        run: |
          npm pack
          npm install -g claude-session-tracker-*.tgz
        shell: bash

      - name: Verify status subcommand
        run: claude-session-tracker status
        shell: bash

      - name: Verify doctor subcommand
        run: claude-session-tracker doctor 2>&1 || true
        shell: bash

      - name: Verify npx execution
        run: |
          npm uninstall -g claude-session-tracker
          npx --yes ./claude-session-tracker-*.tgz status
        shell: bash
